name: Firstpost YouTube Monitor

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'  # Updated to fix warning
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create necessary directories
      run: mkdir -p data docs
    
    - name: Run monitor
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: python main.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add -f data/videos.json docs/index.html
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        git commit -m "Update: $(date '+%Y-%m-%d %H:%M:%S') IST"
        
        # Try push with retry on conflict
        for i in 1 2 3; do
          if git push; then
            echo "✅ Push successful"
            exit 0
          fi
          echo "⚠️ Push failed, pulling latest..."
          git pull origin main --rebase --no-edit || git pull origin main --no-edit
          sleep 2
        done
        
        echo "❌ Failed after retries"
        exit 1